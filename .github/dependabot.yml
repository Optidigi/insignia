version: 2
updates:
  # GitHub Actions — keep these current (security matters for CI runners)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # npm — patch and minor only, grouped to reduce noise
  # Major version upgrades require manual evaluation and are ignored here.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

    ignore:
      # React 19 requires Polaris v14+ — hold until Shopify ecosystem is ready
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # react-konva 19.x requires React 19 — same hold
      - dependency-name: "react-konva"
        update-types: ["version-update:semver-major"]
      # ESLint 9/10 use flat config format — requires config migration
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/eslint-plugin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/parser"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-import-resolver-typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-major"]
      # TypeScript 6 — hold until toolchain confirms compatibility
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Shopify packages — major versions may require coordinated upgrades
      - dependency-name: "@shopify/*"
        update-types: ["version-update:semver-major"]

    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/client"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "vite-tsconfig-paths"
      react-router:
        patterns:
          - "@react-router/*"
          - "react-router"
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
