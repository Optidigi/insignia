# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "eb2c3c7dd059991bc6cd4d421578a8ab"
name = "Insignia"
application_url = "https://insignia.optidigi.nl"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [webhooks.privacy_compliance]
  customer_deletion_url = "/webhooks/gdpr/customer-deletion"
  customer_data_request_url = "/webhooks/gdpr/data-request"
  shop_deletion_url = "/webhooks/gdpr/shop-deletion"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # orders/create — binds Shopify line items to OrderLineCustomization rows
  # and captures immutable geometry snapshots for fulfillment. Required for
  # the /app/orders page, the admin order-block extension, and insignia: tags.
  # Handler: app/routes/webhooks.orders.create.tsx
  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  # orders/paid — finalizes customization configs (RESERVED → PURCHASED) and
  # recycles variant pool slots (RESERVED → FREE). Required for the variant
  # pool not to leak slots after checkout.
  # Handler: app/routes/webhooks.orders.paid.tsx
  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# write_app_proxy required for app proxy (storefront modal)
scopes = "write_products,read_products,read_orders,write_orders,write_app_proxy,write_publications,write_inventory,read_themes"

[auth]
redirect_urls = [ "https://insignia.optidigi.nl/auth/callback" ]

[app_proxy]
url = "https://insignia.optidigi.nl/apps/insignia"
subpath = "insignia"
prefix = "apps"
