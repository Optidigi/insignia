# Shopify app configuration for the Stitchs private Insignia instance.
#
# Usage:
#   shopify app deploy --config insignia-stitchs
#
# This is the existing private app formerly named/configured as
# `insignia-custom`. Keep the client_id unless the Shopify Partner Dashboard
# app is replaced.

client_id = "c6fa981c42fa7d0a405023f0438030e1"
name = "Insignia Stitchs"
application_url = "https://insignia-stitchs.optidigi.nl"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [webhooks.privacy_compliance]
  customer_deletion_url = "/webhooks/gdpr/customer-deletion"
  customer_data_request_url = "/webhooks/gdpr/data-request"
  shop_deletion_url = "/webhooks/gdpr/shop-deletion"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
scopes = "write_products,read_products,read_orders,write_orders,write_app_proxy,write_publications,write_inventory,read_themes,write_metaobjects"

[auth]
redirect_urls = [ "https://insignia-stitchs.optidigi.nl/auth/callback" ]

[app_proxy]
url = "https://insignia-stitchs.optidigi.nl/apps/insignia"
subpath = "insignia"
prefix = "apps"
