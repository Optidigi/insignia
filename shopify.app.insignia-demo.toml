# Insignia Demo — local development app
# Use this config for local dev: shopify app dev --config insignia-demo
# URLs are automatically updated to the Cloudflare tunnel by the CLI.
# Never deploy to production with this config.

client_id = "8d5562e5ec9a58bfe5c0cc5e0f8e63a3"
name = "Insignia Demo"
application_url = "https://nursery-susan-lecture-promises.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [webhooks.privacy_compliance]
  customer_deletion_url = "/webhooks/gdpr/customer-deletion"
  customer_data_request_url = "/webhooks/gdpr/data-request"
  shop_deletion_url = "/webhooks/gdpr/shop-deletion"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "write_products,read_products,read_orders,write_orders,write_app_proxy,write_publications,write_inventory"

[auth]
redirect_urls = [ "https://nursery-susan-lecture-promises.trycloudflare.com/auth/callback" ]

[app_proxy]
url = "https://nursery-susan-lecture-promises.trycloudflare.com/apps/insignia"
subpath = "insignia"
prefix = "apps"
