services:
  db:
    image: postgres:16-alpine
    container_name: insignia-postgres
    environment:
      POSTGRES_USER: insignia
      POSTGRES_PASSWORD: insignia_dev
      POSTGRES_DB: insignia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insignia -d insignia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
